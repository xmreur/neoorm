name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.version)")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi

      - run: pnpm build
      - run: pnpm test

      # Trusted Publisher requires npm >= 11.5.1 and must NOT use NODE_AUTH_TOKEN
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access public --provenance --no-git-checks
